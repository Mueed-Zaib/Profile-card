<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <image src="profole.jpg.JPG" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <span class="name">Cooding Lab</span>
            <span class="job">One Busy Human Being</span>
        </div>


        <div class="media-button">
            <a href="https://www.facebook.com/junaid.mughal.52438174" style="background: #4267b2" class="link"><i class="fa-brands fa-facebook"></i></a>

            <a href="https://x.com/MueedZaib78569" style="background:#1da1f2" class="link"><i class="fa-brands fa-twitter"></i></a>

            <a href="https://www.instagram.com/mueed_zaib/" style="background:#e1306c" class="link"><i class="fa-brands fa-instagram"></i></a>

            <a href="https://www.youtube.com/@MueedZaib" style="background:ff0000" class="link"><i class="fa-brands fa-youtube"></i></a>
        </div>

        <div class="buttons">
            <div class="button">Subscribe</div>
            <div class="button">Message</div>
        </div>

        <div class="analytics">
            <div class="data">
                <i class="fa-regular fa-heart"></i>
                <span class="number">60k</span>
            </div>
            <div class="data">
                <i class="fa-regular fa-comment"></i>
                <span class="number">20k</span>
            </div>
            <div class="data">
                <i class="fa-solid fa-share"></i>
                <span class="number">12k</span>
            </div>
            
        </div>

    </div>


</body>
</html>
